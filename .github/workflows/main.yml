name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf autotools-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer  # Cython sürümünü sabitledik
      - name: Build with Buildozer
        run: |
          # Cython'un yüklendiği yeri zorla gösteriyoruz
          export PATH=$PATH:$HOME/.local/bin
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
