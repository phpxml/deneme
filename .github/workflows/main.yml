name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git zip unzip zlib1g-dev libltdl-dev libffi-dev libssl-dev autoconf autotools-dev python3 python3-pip python3-setuptools libncurses5 libncursesw5
          # Cython'u doğrudan sisteme enjekte ediyoruz
          sudo apt install -y cython3

      - name: Install Buildozer
        run: |
          pip3 install --user --upgrade buildozer
          # Buildozer ve Cython'u çalıştırılabilir hale getiriyoruz
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # Burada her şey kurulu olmalı
          buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
